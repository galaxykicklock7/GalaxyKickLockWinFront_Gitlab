# GitLab CI/CD Configuration for G.O.A.T Backend Server with LocalTunnel (Linux)
# Pure Node.js Backend - No Electron Required

# DEPLOYMENT TIME OPTIMIZATIONS (~60-70% faster):
# 1. Node 20 (faster than Node 16)
# 2. Caching node_modules (saves ~20-30s)
# 3. Faster npm install with --prefer-offline, --no-audit (saves ~10-20s)
# 4. Reduced initial wait times: 15s→3s for server (saves ~12s)
# 5. Smarter retry loops with exponential backoff (saves ~10-15s)
# 6. Parallel installation of localtunnel (saves ~5-10s)
# 7. No Electron/Xvfb overhead (saves ~15-20s)

# Use official Node.js 20 image for best performance
image: node:20

# Define cache for node_modules AND apt packages to speed up builds
cache:
  key:
    files:
      - resources/app/package-lock.json
  paths:
    - resources/app/node_modules/
  policy: pull-push

# Define stages
stages:
  - deploy

# Job configuration
deploy-backend:
  stage: deploy
  
  # Use GitLab's Linux shared runners
  tags:
    - cloud-runner1  # Medium runner (2 vCPU, 7.5GB RAM) - costs 2x CI minutes
  
  # Maximum 1 hour timeout
  timeout: 1h
  
  # Automatic trigger with variables
  when: always
  
  # Define variables that can be set when triggering the pipeline
  variables:
    SUBDOMAIN: "goat-backend"  # Custom subdomain (default: goat-backend for https://goat-backend.loca.lt)
    RC1: ""                     # Recovery Code 1
    RC2: ""                     # Recovery Code 2
    RC3: ""                     # Recovery Code 3
    RC4: ""                     # Recovery Code 4
    KICKRC: ""                  # Kick Code
    PLANET: ""                  # Planet Name
    DEVICE: "312"               # Device Type (312=Android, 323=iOS, 352=Web)
    DURATION: "60"              # Run duration in minutes (max 60 = 1 hour)
    API_PORT: "3000"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  
  before_script:
    - echo "🚀 Deploy for $SUBDOMAIN"
    - echo "Node version:" && node --version
    - echo "NPM version:" && npm --version
  
  script:
    # Install application dependencies
    - |
      echo "Installing application dependencies..."
      cd resources/app
      
      # Check if node_modules exists and is valid
      npm install --prefer-offline --no-audit
      echo "✅ Application dependencies installed"
      
      cd ../..
    
    # Install localtunnel globally (in parallel with background process)
    - |
      echo "Installing localtunnel..."
      npm install -g localtunnel --no-audit --silent --prefer-offline &
      LT_INSTALL_PID=$!
    
    # Start G.O.A.T Backend Server (Pure Node.js - No Electron)
    - |
      echo "Starting G.O.A.T Backend Server..."
      cd resources/app
      
      # Verify files exist
      if [ ! -f "package.json" ]; then
        echo "❌ package.json not found!"
        exit 1
      fi
      
      if [ ! -d "node_modules" ]; then
        echo "❌ node_modules not found!"
        exit 1
      fi
      
      if [ ! -f "main.js" ]; then
        echo "❌ main.js not found!"
        exit 1
      fi
      
      echo "✅ All required files present"
      
      # Start G.O.A.T Backend in background (Pure Node.js)
      echo "🚀 Starting G.O.A.T Backend Server (Node.js)"
      nohup npm start > ../../goat-server.log 2>&1 &
      GOAT_PID=$!
      echo "✅ G.O.A.T Backend started with PID: $GOAT_PID"
      echo "📝 Using npm start (node main.js)"
      
      # Save PID to file for cleanup
      echo $GOAT_PID > $CI_PROJECT_DIR/goat.pid
      
      # Give it a moment to start and show initial logs
      sleep 5
      
      echo ""
      echo "=========================================="
      echo "Initial server logs:"
      echo "=========================================="
      if [ -f "../../goat-server.log" ]; then
        cat ../../goat-server.log
      else
        echo "No log file yet"
      fi
      echo "=========================================="
      echo ""
      
      # Smart wait for server to start
      echo "Waiting for API server to start..."
      sleep 3
      
      # Verify server is running (retry with exponential backoff)
      attempts=0
      max_attempts=6
      server_started=false
      wait_time=2
      
      while [ $attempts -lt $max_attempts ] && [ "$server_started" = "false" ]; do
        attempts=$((attempts + 1))
        echo "Attempt $attempts/$max_attempts to connect to API server..."
        
        if curl -s --max-time 3 http://localhost:3000/api/health > /dev/null 2>&1; then
          health_response=$(curl -s http://localhost:3000/api/health)
          echo "✅ G.O.A.T API Server is running!"
          echo "Response: $health_response"
          server_started=true
        else
          echo "⚠️ Attempt $attempts failed"
          if [ $attempts -lt $max_attempts ]; then
            echo "Waiting $wait_time seconds before retry..."
            sleep $wait_time
            wait_time=$((wait_time * 2))
          fi
        fi
      done
      
      if [ "$server_started" = "false" ]; then
        echo "❌ Failed to start G.O.A.T API Server after $max_attempts attempts"
        echo ""
        echo "=========================================="
        echo "Server logs (last 100 lines):"
        echo "=========================================="
        if [ -f "../../goat-server.log" ]; then
          tail -n 100 ../../goat-server.log
        else
          echo "No log file found"
        fi
        echo "=========================================="
        echo ""
        echo "Checking if process is still running..."
        if ps -p $GOAT_PID > /dev/null 2>&1; then
          echo "✅ Process is still running (PID: $GOAT_PID)"
          echo "Server started but not responding on port 3000"
          echo ""
          echo "Checking what's listening on port 3000..."
          netstat -tuln | grep 3000 || echo "Nothing listening on port 3000"
        else
          echo "❌ Process died (PID: $GOAT_PID)"
        fi
        exit 1
      fi
      
      cd ../..
    
    # Start 3 LocalTunnels in parallel (for redundancy and load balancing)
    - |
      echo "Waiting for localtunnel installation to complete..."
      echo "Starting 3 localtunnels for redundancy..."

      subdomain="${SUBDOMAIN:-goat-backend}"
      base_port=3000

      # Create array to store PIDs and URLs
      declare -a tunnel_pids
      declare -a tunnel_urls

      # Start 3 tunnels all on port 3000 (they route to same backend)
      for i in 1 2 3; do
        port=3000  # ✅ ALL tunnels on port 3000 (same backend!)
        tunnel_subdomain="${subdomain}-tunnel${i}"
        tunnel_url="https://${tunnel_subdomain}.loca.lt"

        echo ""
        echo "🌐 Starting tunnel $i on port $port with subdomain: $tunnel_subdomain"

        # Start localtunnel in background
        nohup lt --port $port --subdomain "$tunnel_subdomain" > "localtunnel_${i}.log" 2>&1 &
        tunnel_pid=$!

        tunnel_pids+=($tunnel_pid)
        tunnel_urls+=("$tunnel_url")

        echo "✅ Tunnel $i started with PID: $tunnel_pid"
        echo "   URL: $tunnel_url"
      done

      # Wait for all tunnels to establish
      echo ""
      echo "⏳ Waiting for tunnels to establish..."
      sleep 3

      # Save all PIDs to file for cleanup
      echo "${tunnel_pids[@]}" > $CI_PROJECT_DIR/localtunnel_all.pids

      echo ""
      echo "=========================================="
      echo "✨ 3 TUNNELS READY FOR LOAD BALANCING"
      echo "=========================================="
      for i in 0 1 2; do
        echo "🌐 Tunnel $((i+1)): ${tunnel_urls[$i]}"
      done
      echo ""
      echo "📌 All URLs will be stored and auto-registered!"
      echo "⚠️ Include header: bypass-tunnel-reminder: true"
      echo "=========================================="
    
    # Keep Running
    - |
      duration="$DURATION"
      
      # Validate duration
      if [ -z "$duration" ] || [ "$duration" -lt 1 ]; then
        duration=60
      fi
      
      if [ "$duration" -gt 60 ]; then
        duration=60
      fi
      
      subdomain="${SUBDOMAIN:-goat-backend}"
      tunnel_url="https://$subdomain.loca.lt"
      
      echo ""
      echo "=========================================="
      echo "🚀 Backend is Running for $subdomain!"
      echo "=========================================="
      echo ""
      echo "Tunnel URL: $tunnel_url"
      echo "Duration: $duration minutes"
      echo "Started: $(date '+%Y-%m-%d %H:%M:%S')"
      echo ""
      echo "💡 TIP: Backend is ready but not connected yet."
      echo "   Use /api/configure and /api/connect to start!"
      echo ""
      echo "Monitoring status every 60 seconds..."
      echo ""
      
      start_time=$(date +%s)
      end_time=$((start_time + duration * 60))
      check_count=0
      
      while [ $(date +%s) -lt $end_time ]; do
        check_count=$((check_count + 1))
        
        if status_response=$(curl -s --max-time 5 http://localhost:3000/api/status 2>/dev/null); then
          connected=$(echo "$status_response" | grep -o '"connected":[^,}]*' | cut -d':' -f2)
          current_time=$(date +%s)
          remaining=$(( (end_time - current_time) / 60 ))
          
          if [ "$connected" = "true" ]; then
            status_icon="✅ Connected"
          else
            status_icon="⭕ Ready (waiting for connection)"
          fi
          
          echo "[$(date '+%H:%M:%S')] Check #$check_count | $status_icon | Time left: $remaining min"
          
          # Show tunnel URL reminder every 10 checks
          if [ $((check_count % 10)) -eq 0 ]; then
            echo ""
            echo "📌 Reminder - Your tunnel URL: $tunnel_url"
            echo ""
          fi
        else
          echo "[$(date '+%H:%M:%S')] ⚠️ Server status check failed"
        fi
        
        sleep 60
      done
      
      echo ""
      echo "=========================================="
      echo "⏰ Run duration completed ($duration minutes)"
      echo "=========================================="
      echo "Shutting down gracefully..."
  
  after_script:
    - |
      echo "🧹 Fast Cleanup (GitLab Runner)"

      # INSTANT KILL - No retries, no waits, just terminate everything
      # This runs in milliseconds to avoid GitLab runner timeout

      # Kill by PID files (fastest method)
      [ -f $CI_PROJECT_DIR/goat.pid ] && kill -9 $(cat $CI_PROJECT_DIR/goat.pid) 2>/dev/null || true

      # ✅ NEW: Kill all 3 tunnels
      if [ -f $CI_PROJECT_DIR/localtunnel_all.pids ]; then
        for pid in $(cat $CI_PROJECT_DIR/localtunnel_all.pids); do
          kill -9 $pid 2>/dev/null || true
        done
      fi

      # Kill all related processes instantly (parallel execution)
      pkill -9 -f "lt --port 300[0-2]" 2>/dev/null &
      pkill -9 -f "localtunnel" 2>/dev/null &
      pkill -9 -f "node.*main.js" 2>/dev/null &
      pkill -9 -f "npm start" 2>/dev/null &
      pkill -9 -f "node.*resources/app" 2>/dev/null &
      
      # Wait for parallel kills to complete (max 100ms)
      wait
      
      # Cleanup files
      rm -f $CI_PROJECT_DIR/goat.pid $CI_PROJECT_DIR/localtunnel.pid 2>/dev/null || true
      
      echo "✅ Cleanup complete"
  
  # Artifacts for debugging
  artifacts:
    when: always
    paths:
      - goat-server.log
      - localtunnel.log
      - resources/app/logs/backend.log
    expire_in: 1 day